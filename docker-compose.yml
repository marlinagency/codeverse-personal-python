services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: codeverse
      POSTGRES_PASSWORD: codeverse
      POSTGRES_DB: codeverse
    expose:
      - "5432"
    volumes:
      - codeverse-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U codeverse -d codeverse"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: ../docker/backend/Dockerfile
    env_file:
      - .env
    environment:
      CODEVERSE_DATABASE_URL: postgresql+psycopg://codeverse:codeverse@postgres:5432/codeverse
      # Sandbox workspaces must live on a host path mounted into this
      # container at the SAME path: bind mounts are resolved by the HOST
      # daemon, so a workspace under the container's own /tmp would arrive
      # empty inside the sibling runtime container.
      CODEVERSE_SANDBOX_WORKSPACE_DIR: /opt/codeverse/.sandbox
    expose:
      - "8000"
    depends_on:
      postgres:
        condition: service_healthy
    # The sandbox execution layer shells out to the HOST Docker daemon so
    # generated user code runs in ITS OWN sibling containers, never inside
    # this backend container. Mounting the host socket is required for that.
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /opt/codeverse/.sandbox:/opt/codeverse/.sandbox

  frontend:
    build:
      context: .
      dockerfile: docker/frontend/Dockerfile
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  codeverse-pgdata:
