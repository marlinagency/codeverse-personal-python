server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # API prefixes proxied to the backend container — same origin for the
    # browser, so the visitor cookie and fetch defaults work with no CORS.
    location ~ ^/(auth|themes|learning|projects|compile|execute|health|openapi.json|docs)($|/) {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;  # AMD student (Gemma 4 12B) full-dictionary generation runs ~4min
    }

    # WebSocket execution endpoint
    location /ws/ {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 300s;
    }

    # SPA fallback: any non-file path serves the app shell
    location / {
        try_files $uri $uri/ /index.html;
    }
}
